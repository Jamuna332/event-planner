<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management System</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="logo">
            <img src="logo.png" alt="Logo" class="logo">
        </div>
        <div>
            <h2>Wedding</h2>
            <span> Bliss Event Planner</span>
        </div>

        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="service.html">Services</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="packages.html">Packages</a></li>
            
        </ul>

        <button class="call-btn">
            <i class="fa-solid fa-phone"></i>Contact us:+977 9856785433
        </button>
    </nav>

    <!-- Hero Section -->
    <section class="hero">

        <div class="overlay"></div>

       <div class="content">
        
        <h2>Make Your</h2>
        <h1><i>Dream Wedding</i></h1>
        <h3>A Beautiful Reality</h3>

        <p>
            Plan | Book | Celebrate<br>
            Your Perfect Day With Us
        </p>

        <button>Book Your Event</button>
    </div>
       

        <!-- Booking Form -->
        <div class="booking-form">
            <h2>Book Your Wedding</h2>

            <input type="text" placeholder="Full Name">
            <input type="email" placeholder="Email">
            <input type="text" placeholder="Phone Number">
            <input type="date">

            <select>
                <option>Number of Guests</option>
                <option>100</option>
                <option>200</option>
                <option>500</option>
            </select>

            <select>
                <option>Select Venue</option>
            </select>

            <select>
                <option>Select Package</option>
            </select>

            <textarea placeholder="Additional Requirements"></textarea>

            <button>Book Now</button>
        </div>

    </section>

  
</body>
</html>
